# =====================================================================
# Decap CMS — éditeur de contenu pour Bénédicte Donet
# Seules les zones listées ici sont éditables par la cliente.
#
# URL publique actuelle : https://www.benedictedonet-psyenligne.com
# =====================================================================

backend:
  name: github
  repo: nicodev3/benedicte-donet
  branch: main
  # OAuth GitHub via Pages Functions — doit correspondre à l’URL où /admin/ est servi
  base_url: https://www.benedictedonet-psyenligne.com
  auth_endpoint: api/auth

locale: fr
# i18n multiple_files : `slug.fr.md` (fr) + `slug.en.md` (en).
# Requiert i18n: true sur chaque collection folder (blog, pages).
i18n:
  structure: multiple_files
  locales: [fr, en]
  default_locale: fr
site_url: https://www.benedictedonet-psyenligne.com
display_url: https://www.benedictedonet-psyenligne.com
logo_url: /images/ui/logo-benedicte-donet.png

# Decap ne liste pas les sous-dossiers : bibliothèque plate dans public/ (prévisualisations).
# Régénérer après ajout d'images : npm run sync:cms-media
media_folder: "public/images/cms-library"
public_folder: "/images/cms-library"

# Brouillons validés avant publication
publish_mode: editorial_workflow

collections:
  # ------------------------------------------------------------------
  # BLOG — création libre d'articles
  # ------------------------------------------------------------------
  - name: "blog"
    label: "Blog"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    format: "frontmatter"
    extension: "md"
    slug: "{{slug}}"
    preview_path: "/{{slug}}/"
    i18n: true
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Titre", name: "title", widget: "string", i18n: true, hint: "Le titre principal de l'article." }
      - label: "Extrait"
        name: "excerpt"
        widget: "text"
        i18n: true
        required: false
        hint: "Résumé court affiché sur la page Blog (2-3 phrases)."
      - label: "Tags"
        name: "tags"
        widget: "list"
        i18n: true
        required: false
        hint: "Un tag par ligne. Réutilisez si possible : Psycho, EMDR, Trauma, Pleine conscience, Psychoéducation, Psychologie positive, Relations humaines, Théorie de l'attachement, Respiration, Santé, Gratitude."
      - { label: "Date de publication", name: "date", widget: "datetime", i18n: duplicate }
      - label: "Date de mise à jour"
        name: "updated"
        widget: "datetime"
        i18n: duplicate
        required: false
        hint: "À remplir uniquement si vous modifiez un article déjà publié."
      - label: "Image principale"
        name: "image"
        widget: "image"
        i18n: duplicate
        required: false
        hint: "Image affichée en haut de l'article et sur la page Blog."
      - label: "Description de l'image"
        name: "imageAlt"
        widget: "string"
        i18n: true
        required: false
        hint: "Décrivez l'image en quelques mots (important pour l'accessibilité et le référencement)."
      - label: "Contenu"
        name: "body"
        widget: "richtext"
        i18n: true
        modes: ["rich_text"]
        sanitize_preview: false
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]
      - label: "Titre SEO"
        name: "seoTitle"
        widget: "string"
        i18n: true
        required: false
        hint: "Titre affiché dans Google (60 caractères max conseillé). Si vide, le titre de l'article est utilisé."
      - label: "Meta description"
        name: "seoDescription"
        widget: "text"
        i18n: true
        required: false
        hint: "Description affichée dans Google (155 caractères max conseillé)."
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        i18n: duplicate
        default: false
        hint: "Activé = l'article n'est PAS visible sur le site."

  # ------------------------------------------------------------------
  # PAGES — modification des pages existantes uniquement (pas de création)
  # ------------------------------------------------------------------
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: false
    delete: false
    format: "frontmatter"
    extension: "md"
    preview_path: "/{{slug}}/"
    i18n: true
    summary: "{{title}}"
    sortable_fields:
      - { field: order, default_sort: asc }
      - title
    fields:
      - { label: "Titre", name: "title", widget: "string", i18n: true }
      - label: "Titre du bandeau"
        name: "heroTitle"
        widget: "string"
        i18n: true
        required: false
        hint: "Titre affiché dans le bandeau en haut de page. Si vide, le titre de la page est utilisé."
      - label: "Description courte"
        name: "description"
        widget: "text"
        i18n: true
        required: false
        hint: "Sous-titre du bandeau (au-dessus du titre) lorsqu'une image de bandeau est définie."
      - label: "Image de bandeau"
        name: "image"
        widget: "image"
        i18n: duplicate
        required: false
        hint: "Image de fond du bandeau en haut de page. Si vide, un en-tête simple est affiché."
      - label: "Description de l'image"
        name: "imageAlt"
        widget: "string"
        i18n: true
        required: false
      - label: "Contenu"
        name: "body"
        widget: "richtext"
        i18n: true
        modes: ["rich_text"]
        sanitize_preview: false
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]
      - label: "Titre SEO"
        name: "seoTitle"
        widget: "string"
        i18n: true
        required: false
        hint: "Titre affiché dans Google. Si vide, le titre de la page est utilisé."
      - label: "Meta description"
        name: "seoDescription"
        widget: "text"
        i18n: true
        required: false
        hint: "Description affichée dans Google (155 caractères max conseillé)."
      - label: "Ordre"
        name: "order"
        widget: "hidden"
        i18n: duplicate
        default: 0
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        i18n: duplicate
        default: false
        hint: "Activé = la page n'est PAS visible sur le site. Attention : ne pas masquer une page sans en parler à votre webmaster."
      - { label: "Type de page", name: "pageType", widget: "hidden", default: "page", i18n: duplicate }
      - label: "Page d'accueil"
        name: "home"
        widget: "object"
        required: false
        collapsed: true
        hint: "Réservé à la page d'accueil. Laisser vide pour les autres pages."
        fields: &home_page_fields
          - label: "Bandeau principal (haut de page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "string" }
              - { label: "Image de fond (bureau)", name: "backgroundImage", widget: "image" }
              - { label: "Image de fond (mobile)", name: "backgroundImageMobile", widget: "image", required: false }
              - { label: "Texte du bouton", name: "primaryCtaLabel", widget: "string" }
              - label: "Lien du bouton"
                name: "primaryCtaUrl"
                widget: "string"
                hint: "En général votre lien Doctolib. Ne pas modifier sans vérifier."
          - label: "Bienvenue (présentation)"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - { label: "Texte du bouton", name: "ctaLabel", widget: "string", required: false }
              - { label: "Lien du bouton", name: "ctaUrl", widget: "string", required: false }
              - { label: "Photo", name: "image", widget: "image", required: false }
          - label: "Pourquoi une psychologue en ligne ?"
            name: "whyOnline"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - { label: "Texte du bouton", name: "ctaLabel", widget: "string", required: false }
              - { label: "Lien du bouton", name: "ctaUrl", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
          - label: "Accompagnements proposés"
            name: "services"
            widget: "object"
            fields:
              - { label: "Titre de la section", name: "title", widget: "string" }
              - label: "Cartes"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - label: "Introduction"
                    name: "intro"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
                    required: false
                  - label: "Points clés"
                    name: "bullets"
                    widget: "list"
                    required: false
                    field:
                      label: "Point"
                      name: "item"
                      widget: "richtext"
                      modes: ["rich_text"]
                      buttons: ["bold", "italic", "link"]
                      editor_components: []
                  - label: "Texte de conclusion"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
                    required: false
                  - { label: "Lien", name: "url", widget: "string" }
                  - { label: "Lien de l'image", name: "imageUrl", widget: "string", required: false }
                  - { label: "Texte du lien", name: "linkLabel", widget: "string", required: false }
                  - { label: "URL du lien de bas de carte", name: "linkUrl", widget: "string", required: false }
                  - { label: "Texte du bouton", name: "ctaLabel", widget: "string", required: false }
                  - { label: "Lien du bouton", name: "ctaUrl", widget: "string", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Titre souligné", name: "titleUnderline", widget: "boolean", default: false, required: false }
                  - label: "Largeur de l'image"
                    name: "imageWidth"
                    widget: "select"
                    required: false
                    options: ["wide", "narrow"]
                    default: "wide"
          - label: "Comment prendre rendez-vous"
            name: "appointment"
            widget: "object"
            fields:
              - { label: "Titre de la section", name: "title", widget: "string" }
              - label: "Étapes"
                name: "steps"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - label: "Texte"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
              - { label: "Texte du bouton", name: "ctaLabel", widget: "string" }
              - { label: "Lien du bouton", name: "ctaUrl", widget: "string" }
          - label: "Masterclass & programmes"
            name: "masterclass"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - { label: "Texte du bouton", name: "ctaLabel", widget: "string" }
              - { label: "Lien du bouton", name: "ctaUrl", widget: "string" }
              - { label: "Image / affiche", name: "image", widget: "image", required: false }
          - label: "Citation"
            name: "quote"
            widget: "object"
            fields:
              - label: "Texte"
                name: "text"
                widget: "richtext"
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - { label: "Auteur", name: "author", widget: "string" }
          - label: "Avis de patients"
            name: "reviews"
            widget: "object"
            fields:
              - { label: "Titre de la section", name: "title", widget: "string" }
              - label: "Avis"
                name: "items"
                widget: "list"
                summary: "{{fields.author}}"
                fields:
                  - { label: "Prénom / nom abrégé", name: "author", widget: "string" }
                  - label: "Texte de l'avis"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
          - label: "Titre SEO de l'accueil"
            name: "seoTitle"
            widget: "string"
            required: false
          - label: "Meta description de l'accueil"
            name: "seoDescription"
            widget: "text"
            required: false
