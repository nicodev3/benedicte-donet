# =====================================================================
# Decap CMS — éditeur de contenu pour Bénédicte Donet
# Seules les zones listées ici sont éditables par la cliente.
#
# URL publique actuelle : https://www.benedictedonet-psyenligne.com
# =====================================================================

backend:
  name: github
  repo: nicodev3/benedicte-donet
  branch: main
  # OAuth GitHub via Pages Functions — doit correspondre à l’URL où /admin/ est servi
  base_url: https://www.benedictedonet-psyenligne.com
  auth_endpoint: api/auth

locale: fr
# i18n multiple_files : `slug.fr.md` (fr) + `slug.en.md` (en).
# Requiert i18n: true sur chaque collection folder (blog, pages).
i18n:
  structure: multiple_files
  locales: [fr, en]
  default_locale: fr
site_url: https://www.benedictedonet-psyenligne.com
display_url: https://www.benedictedonet-psyenligne.com
logo_url: /images/ui/logo-benedicte-donet.png

# Decap ne liste pas les sous-dossiers : bibliothèque plate dans public/ (prévisualisations).
# Au build, sync:cms-media miroire les uploads vers src/assets/images/uploads/
# → Astro génère WebP + tailles mobile/desktop automatiquement.
media_folder: "public/images/cms-library"
public_folder: "/images/cms-library"

# Brouillons validés avant publication
publish_mode: editorial_workflow

collections:
  # ------------------------------------------------------------------
  # BLOG — création libre d'articles
  # ------------------------------------------------------------------
  - name: "blog"
    label: "Blog"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    format: "frontmatter"
    extension: "md"
    slug: "{{slug}}"
    preview_path: "/{{slug}}/"
    i18n: true
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Titre", name: "title", widget: "string", i18n: true, hint: "Le titre principal de l'article." }
      - label: "Extrait"
        name: "excerpt"
        widget: "text"
        i18n: true
        required: false
        hint: "Résumé court affiché sur la page Blog (2-3 phrases)."
      - label: "Tags"
        name: "tags"
        widget: "list"
        i18n: true
        required: false
        hint: "Un tag par ligne. Réutilisez si possible : Psycho, EMDR, Trauma, Pleine conscience, Psychoéducation, Psychologie positive, Relations humaines, Théorie de l'attachement, Respiration, Santé, Gratitude."
      - { label: "Date de publication", name: "date", widget: "datetime", i18n: duplicate }
      - label: "Date de mise à jour"
        name: "updated"
        widget: "datetime"
        i18n: duplicate
        required: false
        hint: "À remplir uniquement si vous modifiez un article déjà publié."
      - label: "Image principale"
        name: "image"
        widget: "image"
        choose_url: false
        i18n: duplicate
        required: false
        hint: "Image affichée en haut de l'article et sur la page Blog."
      - label: "Description de l'image"
        name: "imageAlt"
        widget: "string"
        i18n: true
        required: false
        hint: "Décrivez l'image en quelques mots (important pour l'accessibilité et le référencement)."
      - label: "Contenu"
        name: "body"
        widget: "richtext"
        i18n: true
        modes: ["rich_text"]
        sanitize_preview: false
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]
      # SEO géré dans les fichiers markdown (pas dans le CMS)
      - { label: "Titre SEO", name: "seoTitle", widget: "hidden", i18n: true, required: false }
      - { label: "Meta description", name: "seoDescription", widget: "hidden", i18n: true, required: false }
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        i18n: duplicate
        default: false
        hint: "Activé = l'article n'est PAS visible sur le site."

  # ------------------------------------------------------------------
  # ACCUEIL — page d'accueil (contenu = sections home, pas le markdown body)
  # ------------------------------------------------------------------
  - name: "accueil"
    label: "Page d'accueil"
    label_singular: "Page d'accueil"
    folder: "src/content/pages"
    filter: { field: "pageType", value: "home" }
    create: false
    delete: false
    format: "frontmatter"
    extension: "md"
    preview_path: "/"
    i18n: true
    summary: "{{title}}"
    fields:
      # Titre / brouillon / body : gérés côté code (pas exposés à la cliente)
      - { label: "Titre", name: "title", widget: "hidden", i18n: true, default: "Page d'accueil" }
      - { label: "Ordre", name: "order", widget: "hidden", i18n: duplicate, default: 1 }
      - { label: "Brouillon", name: "draft", widget: "hidden", i18n: duplicate, default: false }
      - { label: "Type de page", name: "pageType", widget: "hidden", default: "home", i18n: duplicate }
      - label: "Contenu de l'accueil"
        name: "home"
        widget: "object"
        i18n: true
        collapsed: false
        fields: &home_page_fields
          - label: "Bandeau principal (haut de page)"
            name: "hero"
            widget: "object"
            i18n: true
            hint: "Le grand bandeau en haut de la page d'accueil."
            fields:
              - label: "Titre"
                name: "title"
                widget: "string"
                i18n: true
                hint: "Ex. « Psychologue en ligne »."
              - label: "Sous-titre"
                name: "subtitle"
                widget: "string"
                i18n: true
                hint: "Courte phrase sous le titre (spécialités, approche…)."
              - label: "Image de fond"
                name: "backgroundImage"
                widget: "image"
                choose_url: false
                i18n: duplicate
                hint: "Image affichée derrière le titre. Une seule image suffit : le site la convertit en WebP et l'adapte automatiquement sur téléphone et ordinateur."
              - label: "Texte du bouton"
                name: "primaryCtaLabel"
                widget: "string"
                i18n: true
                hint: "Ex. « Je prends rendez-vous »."
              - label: "Lien du bouton"
                name: "primaryCtaUrl"
                widget: "string"
                i18n: duplicate
                hint: "En général votre lien Doctolib. Ne pas modifier sans vérifier."
          - label: "Bienvenue (présentation)"
            name: "intro"
            widget: "object"
            i18n: true
            hint: "Section de présentation juste sous le bandeau."
            fields:
              - { label: "Titre", name: "title", widget: "string", i18n: true }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                i18n: true
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
                hint: "Votre texte de présentation. Vous pouvez mettre des mots en gras ou ajouter des liens."
              - label: "Texte du bouton"
                name: "ctaLabel"
                widget: "string"
                required: false
                i18n: true
                hint: "Ex. « Découvrir ma pratique ». Laissez vide pour masquer le bouton."
              - label: "Lien du bouton"
                name: "ctaUrl"
                widget: "string"
                required: false
                i18n: true
                hint: "Page vers laquelle mène le bouton (ex. /a-propos/)."
              - label: "Photo"
                name: "image"
                widget: "image"
                choose_url: false
                required: false
                i18n: duplicate
                hint: "Votre photo affichée à côté du texte."
          - label: "Pourquoi une psychologue en ligne ?"
            name: "whyOnline"
            widget: "object"
            i18n: true
            fields:
              - { label: "Titre", name: "title", widget: "string", i18n: true }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                i18n: true
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - label: "Texte du bouton"
                name: "ctaLabel"
                widget: "string"
                required: false
                i18n: true
                hint: "Laissez vide pour masquer le bouton."
              - label: "Lien du bouton"
                name: "ctaUrl"
                widget: "string"
                required: false
                i18n: true
              - label: "Image"
                name: "image"
                widget: "image"
                choose_url: false
                required: false
                i18n: duplicate
                hint: "Photo ou illustration à côté du texte."
          - label: "Accompagnements proposés"
            name: "services"
            widget: "object"
            i18n: true
            hint: "Les 3 cartes présentant vos accompagnements (séance, ateliers, photothérapie…)."
            fields:
              - { label: "Titre de la section", name: "title", widget: "string", i18n: true }
              # List widgets : seul i18n: true est supporté (sous-champs ignorés pour i18n).
              - label: "Cartes"
                name: "cards"
                widget: "list"
                i18n: true
                summary: "{{fields.title}}"
                hint: "Chaque carte = un accompagnement. L'ordre des cartes est celui affiché sur le site."
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - label: "Introduction"
                    name: "intro"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
                    required: false
                    hint: "Paragraphe d'ouverture de la carte (optionnel)."
                  - label: "Points clés"
                    name: "bullets"
                    widget: "list"
                    required: false
                    hint: "Liste à puces sous l'introduction (un point par ligne)."
                    field:
                      label: "Point"
                      name: "item"
                      widget: "richtext"
                      modes: ["rich_text"]
                      buttons: ["bold", "italic", "link"]
                      editor_components: []
                  - label: "Texte de conclusion"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
                    required: false
                    hint: "Paragraphe de fin sous les points clés (optionnel)."
                  - label: "Lien du titre"
                    name: "url"
                    widget: "string"
                    hint: "Page ouverte quand on clique sur le titre (ex. /psychotherapie/)."
                  - label: "Texte du lien en bas"
                    name: "linkLabel"
                    widget: "string"
                    required: false
                    hint: "Lien texte en bas de la carte (ex. « Consultez les tarifs »). Laissez vide si inutile."
                  - label: "Adresse du lien en bas"
                    name: "linkUrl"
                    widget: "string"
                    required: false
                    hint: "Où mène le lien en bas. Si vide, le lien du titre est utilisé."
                  - label: "Texte du bouton"
                    name: "ctaLabel"
                    widget: "string"
                    required: false
                    hint: "Bouton sous la carte (ex. « Prendre rendez-vous »). Laissez vide pour le masquer."
                  - label: "Lien du bouton"
                    name: "ctaUrl"
                    widget: "string"
                    required: false
                    hint: "Adresse du bouton (lien Doctolib ou page interne)."
                  - label: "Illustration"
                    name: "image"
                    widget: "image"
                    choose_url: false
                    required: false
                    hint: "Petite image décorative au-dessus du titre."
                  # Options de mise en page gérées côté code (pas exposées)
                  - { label: "Lien de l'image", name: "imageUrl", widget: "hidden", required: false }
                  - { label: "Titre souligné", name: "titleUnderline", widget: "hidden", default: false, required: false }
                  - { label: "Largeur de l'image", name: "imageWidth", widget: "hidden", required: false, default: "wide" }
          - label: "Comment prendre rendez-vous"
            name: "appointment"
            widget: "object"
            i18n: true
            hint: "Les étapes pour prendre rendez-vous, avec le bouton Doctolib."
            fields:
              - { label: "Titre de la section", name: "title", widget: "string", i18n: true }
              - label: "Étapes"
                name: "steps"
                widget: "list"
                i18n: true
                summary: "{{fields.title}}"
                hint: "Chaque étape apparaît dans l'ordre (Demande → Confirmation → Jour J)."
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - label: "Texte"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
              - label: "Texte du bouton"
                name: "ctaLabel"
                widget: "string"
                i18n: true
              - label: "Lien du bouton"
                name: "ctaUrl"
                widget: "string"
                i18n: duplicate
                hint: "En général votre lien Doctolib."
          - label: "Masterclass & programmes"
            name: "masterclass"
            widget: "object"
            i18n: true
            fields:
              - { label: "Titre", name: "title", widget: "string", i18n: true }
              - label: "Texte"
                name: "text"
                widget: "richtext"
                i18n: true
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - { label: "Texte du bouton", name: "ctaLabel", widget: "string", i18n: true }
              - label: "Lien du bouton"
                name: "ctaUrl"
                widget: "string"
                i18n: true
                hint: "En général /masterclass/."
              - label: "Image"
                name: "image"
                widget: "image"
                choose_url: false
                required: false
                i18n: duplicate
                hint: "Photo ou illustration de la section."
          - label: "Citation"
            name: "quote"
            widget: "object"
            i18n: true
            hint: "Citation affichée entre les masterclass et les avis."
            fields:
              - label: "Texte"
                name: "text"
                widget: "richtext"
                i18n: true
                modes: ["rich_text"]
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - label: "Auteur"
                name: "author"
                widget: "string"
                i18n: true
                hint: "Nom de l'auteur de la citation."
          - label: "Avis de patients"
            name: "reviews"
            widget: "object"
            i18n: true
            hint: "Témoignages affichés en carrousel en bas de page."
            fields:
              - { label: "Titre de la section", name: "title", widget: "string", i18n: true }
              - label: "Avis"
                name: "items"
                widget: "list"
                i18n: true
                summary: "{{fields.author}}"
                hint: "Ajoutez, modifiez ou réordonnez les avis. L'ordre ici = l'ordre sur le site."
                fields:
                  - label: "Prénom / nom abrégé"
                    name: "author"
                    widget: "string"
                    hint: "Ex. « Margaux D. » — gardez l'anonymat."
                  - label: "Texte de l'avis"
                    name: "text"
                    widget: "richtext"
                    modes: ["rich_text"]
                    buttons: ["bold", "italic", "link"]
                    editor_components: []
          # SEO géré dans les fichiers markdown (pas dans le CMS)
          - { label: "Titre SEO", name: "seoTitle", widget: "hidden", i18n: true, required: false }
          - { label: "Meta description", name: "seoDescription", widget: "hidden", i18n: true, required: false }

  # ------------------------------------------------------------------
  # PAGES — autres pages (pas de création / suppression)
  # ------------------------------------------------------------------
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    filter: { field: "pageType", value: "page" }
    create: false
    delete: false
    format: "frontmatter"
    extension: "md"
    preview_path: "/{{slug}}/"
    i18n: true
    summary: "{{title}}"
    sortable_fields:
      - { field: order, default_sort: asc }
      - title
    fields:
      - { label: "Titre", name: "title", widget: "string", i18n: true }
      - label: "Titre du bandeau"
        name: "heroTitle"
        widget: "string"
        i18n: true
        required: false
        hint: "Titre affiché dans le bandeau en haut de page. Si vide, le titre de la page est utilisé."
      - label: "Sous-titre du bandeau"
        name: "description"
        widget: "text"
        i18n: true
        required: false
        hint: "Courte phrase au-dessus du titre, visible uniquement s'il y a une image de bandeau."
      - label: "Image de bandeau"
        name: "image"
        widget: "image"
        choose_url: false
        i18n: duplicate
        required: false
        hint: "Image de fond du haut de page. Si vous laissez vide, un en-tête simple (sans image) s'affiche."
      - label: "Description de l'image"
        name: "imageAlt"
        widget: "string"
        i18n: true
        required: false
        hint: "Décrivez l'image en quelques mots (accessibilité et référencement)."
      - label: "Contenu de la page"
        name: "body"
        widget: "richtext"
        i18n: true
        modes: ["rich_text"]
        sanitize_preview: false
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]
        hint: "Le texte principal de la page. Utilisez les titres pour structurer, et le bouton image pour illustrer."
      # SEO / brouillon gérés côté code (pas exposés à la cliente)
      - { label: "Titre SEO", name: "seoTitle", widget: "hidden", i18n: true, required: false }
      - { label: "Meta description", name: "seoDescription", widget: "hidden", i18n: true, required: false }
      - { label: "Ordre", name: "order", widget: "hidden", i18n: duplicate, default: 0 }
      - { label: "Brouillon", name: "draft", widget: "hidden", i18n: duplicate, default: false }
      - { label: "Type de page", name: "pageType", widget: "hidden", default: "page", i18n: duplicate }
